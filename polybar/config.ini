[colors]
background = #000000
background-alt = #222222
foreground = #FFFFFF

primary = #FF2277
secondary = #0F2277

alert = #A54242
disabled = #666

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[bar/party_bar]
width = 100%
height = 18pt
radius = 6
bottom = true

; dpi = 96

; background-0 = #000005 
; background-1 = #00001A
; background-2 = #000025
; background-3 = #00003A
; background-4 = #000045
background = ${colors.background}
foreground = ${colors.foreground}
primary = ${colors.primary}
secondary = ${colors.secondary}
disabled = ${colors.disabled}
alert = ${color.alert}

line-size = 2pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1.5

separator = |
separator-foreground = ${colors.disabled}

font-0 = hack:size=8
font-1 = FontAwesome6Free:style=Solid:size=9
font-2 = FontAwesome6Brands:style=Regular:size=9

modules-left = xworkspaces xwindow
modules-right = battery backlight pulseaudio cpu memory wlan timer xkeyboard date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/pulseaudio]
type = internal/pulseaudio
	
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${root.foreground}

	
label-muted = Ôö©
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = ÔÄ¶ 
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®
ramp-volume-foreground = ${colors.primary}

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

; format-prefix = "ÔĄú  "
; format-prefix-foreground = ${colors.primary}
label-layout = %layout%
label-layout-foreground = ${colors.foreground}

label-indicator-padding = 2
label-indicator-margin = 1

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
; label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
label-disconnected = disconnected
label-disconnected-foreground = ${colors.disabled}

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/wlan]
inherit = network-base
interface-type = wireless
#label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %essid%

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/timer]

type = custom/script


exec = ~/.config/polybar/timer/timer.sh tail 'Ôč≤'
tail = true

click-left = ~/.config/polybar/timer/timer.sh new 25 'ÔĄĶ' 'Ôäč' 'notify-send "Session finished"'
click-middle = ~/.config/polybar/timer/timer.sh cancel
click-right = ~/.config/polybar/timer/timer.sh togglepause
; scroll-up = ~/.config/polybar/timer/timer.sh increase 60 || ~/.config/polybar/timer.sh new 1 'TIMER' 'PAUSED' 'notify-send -u critical "Timer expired."' ; ~/.config/polybar/timer.sh update %pid%
; scroll-down = ~/.config/polybar/timer/timer.sh increase -60

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/battery]

type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-full = ÔČÄ %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = ÔČÉ
ramp-capacity-1-foreground = ${colors.alert}
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = ÔÉß
animation-charging-foreground = ${colors.primary}


# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[module/backlight]
type = internal/backlight

card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <ramp> <label>
label = %percentage%%
ramp-0 = ÔÜÜ
ramp-1 = ÔĀ©
ramp-2 = ÔÜÖ
ramp-0-foreground = ${colors.disabled}
ramp-foreground = ${colors.primary}

# _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-

[settings]
screenchange-reload = true
pseudo-transparency = true

; format numbers
; timer